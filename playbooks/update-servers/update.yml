---
- name: Update servers
  hosts: all

  tasks:
    - name: "apt-get update"
      apt:
        update_cache: yes
    - name: Peform package upgrade
      apt:
        name: "*"
        state: latest
    - name: Remove useless packages from cache
      apt:
        autoclean: yes
    - name: Remove orphane depedencies
      apt:
        autoremove: yes

- name: DNS Updates
  hosts: pihole

  tasks:
    - name: Update pihole gravity list
      command: pihole -g
    - name: Check for pihole Updates
      command: pihole -up
    - name: Restart DNS
      command: pihole restartdns
